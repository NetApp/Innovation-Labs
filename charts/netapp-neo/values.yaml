---
# -- Global overrides
nameOverride: ""
# -- Image pull secrets (shared across all services)
imagePullSecrets: []

# OpenShift security posture controls.
openshift:
  # Master switch: set true when deploying on OpenShift, false for vanilla
  # Kubernetes. When false, OpenShift-only validations and ServiceAccounts are
  # skipped and workloads use explicit runAsUser security contexts instead of
  # relying on the restricted-v2 SCC to inject a UID.
  deploy: false
  restrictedV2:
    # Mandatory for this chart in OpenShift.
    enabled: true
  api:
    serviceAccount:
      create: true
      name: ""
      annotations: {}
  ui:
    serviceAccount:
      create: true
      name: ""
      annotations: {}
  privilegedWorkloads:
    # Create namespaced RoleBindings granting the worker/extractor service
    # accounts use of the named SCC. This automates the otherwise-manual
    # `oc adm policy add-scc-to-user` step. The installer must be able to create
    # RoleBindings in the target namespace.
    bindSCC: true
    sccName: privileged
    worker:
      # Mandatory: worker mounts filesystems and needs privileged exception mode.
      enabled: true
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containerSecurityContext:
        allowPrivilegeEscalation: true
        runAsNonRoot: false
        appArmorProfile:
          type: Unconfined
        capabilities:
          add:
            - SYS_ADMIN
            - DAC_READ_SEARCH
    extractor:
      # Mandatory: extractor mounts filesystems and needs privileged exception mode.
      enabled: true
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containerSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        privileged: true
        allowPrivilegeEscalation: true
        runAsNonRoot: false
        appArmorProfile:
          type: Unconfined
  # Postgres runs as its built-in image UID (70 in the alpine image). On
  # OpenShift, restricted-v2 would force a random UID and break data-directory
  # ownership, so the postgres SA is bound to the anyuid SCC instead.
  postgres:
    bindAnyuid: true
    sccName: anyuid
    serviceAccount:
      create: true
      name: ""
      annotations: {}

# API Service
api:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-api
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    sessionAffinity: ClientIP
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
      
# Worker Service
worker:
  replicaCount: 2
  image:
    repository: ghcr.io/netapp/netapp-neo-worker
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# Extractor Service
extractor:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-extractor
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}

# NER Service
ner:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-ner
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  gpu:
    enabled: false
    count: 1
  nodeSelector: {}
  tolerations: []

# UI Service
ui:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/neo-ui-framework
    tag: "v4.0.0"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}
  securityContext: {}

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  name: postgres
  image:
    repository: docker.io/library/postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: "neouser"
    password: "neopassword"
    database: "neodb"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations: {}
  resources: {}
  # Pod-level security context. fsGroup makes the PVC writable by the postgres
  # group (gid 70 in the alpine image). Works on vanilla Kubernetes and on
  # OpenShift when the postgres SA is bound to the anyuid SCC.
  podSecurityContext:
    fsGroup: 70
  securityContext: {}
  # When postgresql.enabled is false, set this to your external DB URL
  externalDatabaseUrl: ""

# =============================================================================
# Data-plane backend (Elasticsearch overlay)
# =============================================================================
# Selects where file metadata, content chunks and search live. The relational
# control plane (work queue, coordination, config, auth) is ALWAYS PostgreSQL —
# this only swaps the data plane.
#
#   backend: "pg" (default) keeps everything relational; nothing else is needed.
#   backend: "es"           enables the Elasticsearch data plane. Elasticsearch
#                           is expected to already be running (e.g. in its own
#                           namespace) and reachable at esUrl. DATABASE_URL is
#                           still required and still points at PostgreSQL.
#
# Injected (only when backend == "es") into the api, worker and extractor
# containers as AIDE_BACKEND / AIDE_DP_URL / AIDE_ES_INDEX_PREFIX.
dataPlane:
  backend: "pg"
  # Elasticsearch URL for the data plane. Use the in-cluster service FQDN.
  # Example (ES in a dedicated namespace):
  #   es://elasticsearch.neo-414-es.svc.cluster.local:9200
  # Use https:// once x-pack security/TLS is enabled.
  #
  # Leave empty to use the bundled Elasticsearch below (elasticsearch.deploy:
  # true) — the URL is then derived automatically from its service.
  esUrl: ""
  # Optional index name prefix (default "neo_" in the app) so multiple
  # deployments can share one ES cluster, e.g. "neo_414_".
  indexPrefix: ""

# =============================================================================
# Bundled Elasticsearch (optional, single-node)
# =============================================================================
# When deploy is true, the chart stands up a single-node Elasticsearch
# StatefulSet (and optional Kibana) to back the data plane, and dataPlane.esUrl
# is derived automatically from its service. Leave deploy false to point at an
# externally managed Elasticsearch via dataPlane.esUrl instead.
#
# This is a PoC/benchmark topology: single node, no replicas. x-pack security is
# disabled by default (plain HTTP, no auth) — only acceptable on a trusted /
# air-gapped network.
elasticsearch:
  deploy: false
  image:
    repository: docker.elastic.co/elasticsearch/elasticsearch
    tag: "9.4.2"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 9200
  # JVM heap. Keep Xms == Xmx and well below the memory limit.
  javaOpts: "-Xms2g -Xmx2g"
  # x-pack security. false => plain HTTP, no auth (PoC). When enabling this you
  # must also set dataPlane.esUrl explicitly (https:// with credentials).
  security:
    enabled: false
  # Run an init container that raises vm.max_map_count to 262144 (required by
  # ES). Needs a privileged container; disable on clusters that block privileged
  # init containers (e.g. OpenShift restricted-v2) and set the sysctl on the node
  # instead.
  setVmMaxMapCount: true
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 10Gi
    annotations: {}
  resources:
    requests:
      cpu: "1"
      memory: "2Gi"
    limits:
      cpu: "4"
      memory: "8Gi"
  podSecurityContext:
    fsGroup: 1000
  nodeSelector: {}
  tolerations: []
  # Optional Kibana for index inspection.
  kibana:
    enabled: false
    image:
      repository: docker.elastic.co/kibana/kibana
      tag: "9.4.2"
      pullPolicy: IfNotPresent
    service:
      type: ClusterIP
      port: 5601
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
