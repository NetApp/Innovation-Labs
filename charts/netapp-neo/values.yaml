---
# -- Global overrides
nameOverride: ""
# -- Image pull secrets (shared across all services)
imagePullSecrets: []

# OpenShift security posture controls.
openshift:
  # Master switch: set true when deploying on OpenShift, false for vanilla
  # Kubernetes. When false, OpenShift-only validations and ServiceAccounts are
  # skipped and workloads use explicit runAsUser security contexts instead of
  # relying on the restricted-v2 SCC to inject a UID.
  deploy: true
  restrictedV2:
    # Mandatory for this chart in OpenShift.
    enabled: true
  api:
    serviceAccount:
      create: true
      name: ""
      annotations: {}
  ui:
    serviceAccount:
      create: true
      name: ""
      annotations: {}
  privilegedWorkloads:
    # Create namespaced RoleBindings granting the worker/extractor service
    # accounts use of the named SCC. This automates the otherwise-manual
    # `oc adm policy add-scc-to-user` step. The installer must be able to create
    # RoleBindings in the target namespace.
    bindSCC: true
    sccName: privileged
    worker:
      # Mandatory: worker mounts filesystems and needs privileged exception mode.
      enabled: true
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containerSecurityContext:
        allowPrivilegeEscalation: true
        runAsNonRoot: false
        appArmorProfile:
          type: Unconfined
        capabilities:
          add:
            - SYS_ADMIN
            - DAC_READ_SEARCH
    extractor:
      # Mandatory: extractor mounts filesystems and needs privileged exception mode.
      enabled: true
      serviceAccount:
        create: true
        name: ""
        annotations: {}
      podSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containerSecurityContext:
        runAsUser: 1000
        runAsGroup: 1000
        privileged: true
        allowPrivilegeEscalation: true
        runAsNonRoot: false
        appArmorProfile:
          type: Unconfined
  # Postgres runs as its built-in image UID (70 in the alpine image). On
  # OpenShift, restricted-v2 would force a random UID and break data-directory
  # ownership, so the postgres SA is bound to the anyuid SCC instead.
  postgres:
    bindAnyuid: true
    sccName: anyuid
    serviceAccount:
      create: true
      name: ""
      annotations: {}

# API Service
api:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-api
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    sessionAffinity: ClientIP
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
      
# Worker Service
worker:
  replicaCount: 2
  image:
    repository: ghcr.io/netapp/netapp-neo-worker
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# Extractor Service
extractor:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-extractor
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}

# NER Service
ner:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-ner
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  gpu:
    enabled: false
    count: 1
  nodeSelector: {}
  tolerations: []

# UI Service
ui:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/neo-ui-framework
    tag: "v4.0.0"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}
  securityContext: {}

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  name: postgres
  image:
    repository: docker.io/library/postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: "neouser"
    password: "neopassword"
    database: "neodb"
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations: {}
  resources: {}
  # Pod-level security context. fsGroup makes the PVC writable by the postgres
  # group (gid 70 in the alpine image). Works on vanilla Kubernetes and on
  # OpenShift when the postgres SA is bound to the anyuid SCC.
  podSecurityContext:
    fsGroup: 70
  securityContext: {}
  # When postgresql.enabled is false, set this to your external DB URL
  externalDatabaseUrl: ""
