---
# -- Global overrides
nameOverride: ""
# -- Image pull secrets (shared across all services)
imagePullSecrets: []

# API Service
api:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-api
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    sessionAffinity: ClientIP
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"
      
# Worker Service
worker:
  replicaCount: 2
  image:
    repository: ghcr.io/netapp/netapp-neo-worker
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
    limits:
      cpu: "2000m"
      memory: "2Gi"

# Extractor Service
extractor:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-extractor
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}

# NER Service
ner:
  enabled: false
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-ner
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  gpu:
    enabled: false
    count: 1
  nodeSelector: {}
  tolerations: []

# UI Service
ui:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/neo-ui-framework
    tag: "4.0.0"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  name: postgres
  image:
    repository: docker.io/library/postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: 
    password: 
    database: 
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations: {}
  resources: {}
  # When postgresql.enabled is false, set this to your external DB URL
  externalDatabaseUrl: ""
