---
# -- Global overrides
nameOverride: ""
fullnameOverride: ""

# -- Image pull secrets (shared across all services)
imagePullSecrets: []

# =============================================================================
# API Service
# =============================================================================
api:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-api
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    sessionAffinity: ClientIP
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}
  env:
    # JWT
    JWT_SECRET_KEY: ""
    ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
    # Encryption
    ENCRYPTION_KEY: ""
    # License
    NETAPP_CONNECTOR_LICENSE: ""
    CONNECTOR_ID: "netappneo"
    # Microsoft Graph
    MS_GRAPH_TENANT_ID: ""
    MS_GRAPH_CLIENT_ID: ""
    MS_GRAPH_CLIENT_SECRET: ""
    MS_GRAPH_CONNECTOR_ID: "netappneo"
    MS_GRAPH_CONNECTOR_NAME: "NetApp NEO Connector"
    MS_GRAPH_CONNECTOR_DESCRIPTION: ""
    # MCP OAuth
    MCP_OAUTH_ENABLED: "false"
    MCP_OAUTH_TENANT_ID: ""
    MCP_OAUTH_CLIENT_ID: ""
    MCP_OAUTH_CLIENT_SECRET: ""
    MCP_OAUTH_AUDIENCE: ""
    # MCP API Key
    MCP_API_KEY: ""

# =============================================================================
# Worker Service
# =============================================================================
worker:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-worker
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    # Encryption
    ENCRYPTION_KEY: ""
    # License
    NETAPP_CONNECTOR_LICENSE: ""
    CONNECTOR_ID: "netappneo"
    # Microsoft Graph
    MS_GRAPH_TENANT_ID: ""
    MS_GRAPH_CLIENT_ID: ""
    MS_GRAPH_CLIENT_SECRET: ""
    MS_GRAPH_CONNECTOR_ID: "netappneo"
    # Concurrency
    NUM_UPLOAD_WORKERS: "3"
    NUM_EXTRACTION_WORKERS: "2"
    NUM_ACL_RESOLUTION_WORKERS: "2"
    NUM_NER_WORKERS: "1"
    MAX_NER_CONCURRENT_WORK: "1"
    # ACL
    ACL_STRICT_MODE: "true"

# =============================================================================
# Extractor Service
# =============================================================================
extractor:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-extractor
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    # Encryption
    ENCRYPTION_KEY: ""
    # Extraction
    EXTRACTOR_LOG_LEVEL: "INFO"
    EXTRACTOR_DEFAULT_PIPELINE: ""
    EXTRACTOR_MOUNT_TTL: ""
    EXTRACTOR_FORCE_CPU: ""
    # VLM
    VLM_MODEL: ""
    VLM_API_URL: ""
    VLM_API_MODEL: ""
    # OpenAI
    OPENAI_API_KEY: ""
    OPENAI_MODEL: "gpt-4o"

# =============================================================================
# NER Service
# =============================================================================
ner:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-ner
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    NER_MODEL_NAME: "fastino/gliner2-base-v1"
    NER_CONFIDENCE_THRESHOLD: "0.7"
    NER_MAX_TEXT_LENGTH: "100000"
    NER_DEVICE: "auto"
    NER_CUDA_MAX_TEXT_LENGTH: "25000"
    NER_CHUNK_OVERLAP: "500"
    TOKENIZERS_PARALLELISM: "false"
  gpu:
    enabled: false
    count: 1
  nodeSelector: {}
  tolerations: []

# =============================================================================
# UI Service
# =============================================================================
ui:
  replicaCount: 1
  image:
    repository: ghcr.io/beezy-dev/neo-ui-framework
    tag: "3.2.2"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  name: neo-postgres
  image:
    repository: docker.io/library/postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: neo
    password: neo_password
    database: neo_connector
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations: {}
  resources: {}
  # When postgresql.enabled is false, set this to your external DB URL
  externalDatabaseUrl: ""
