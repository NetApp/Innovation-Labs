---
# -- Global overrides
nameOverride: ""
# -- Image pull secrets (shared across all services)
imagePullSecrets: []
# =============================================================================
# API Service
# =============================================================================
api:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-api
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
    sessionAffinity: ClientIP
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}


# =============================================================================
# Worker Service
# =============================================================================
worker:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-worker
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    # Concurrency
    NUM_UPLOAD_WORKERS: "3"
    NUM_EXTRACTION_WORKERS: "2"
    NUM_ACL_RESOLUTION_WORKERS: "2"
    NUM_NER_WORKERS: "1"
    MAX_NER_CONCURRENT_WORK: "1"
    # ACL
    ACL_STRICT_MODE: "true"

# =============================================================================
# Extractor Service
# =============================================================================
extractor:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-extractor
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    # Extraction
    EXTRACTOR_LOG_LEVEL: "INFO"
    EXTRACTOR_DEFAULT_PIPELINE: "markitdown"
    # EXTRACTOR_MOUNT_TTL: ""
    # EXTRACTOR_FORCE_CPU: ""

# =============================================================================
# NER Service
# =============================================================================
ner:
  replicaCount: 1
  image:
    repository: ghcr.io/netapp/netapp-neo-ner
    tag: ""
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 8000
  resources: {}
  env:
    NER_MODEL_NAME: "fastino/gliner2-base-v1"
    NER_CONFIDENCE_THRESHOLD: "0.7"
    NER_MAX_TEXT_LENGTH: "100000"
    NER_DEVICE: "auto"
    NER_CUDA_MAX_TEXT_LENGTH: "25000"
    NER_CHUNK_OVERLAP: "500"
    TOKENIZERS_PARALLELISM: "false"
  gpu:
    enabled: false
    count: 1
  nodeSelector: {}
  tolerations: []

# =============================================================================
# UI Service
# =============================================================================
ui:
  replicaCount: 1
  image:
    repository: ghcr.io/beezy-dev/neo-ui-framework
    tag: "3.2.2"
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80
  ingress:
    enabled: false
    host:
    path: /
    pathType: Prefix
    className:
    annotations: {}
    tls: []
  resources: {}

# =============================================================================
# PostgreSQL
# =============================================================================
postgresql:
  enabled: true
  name: postgres
  image:
    repository: docker.io/library/postgres
    tag: "17-alpine"
    pullPolicy: IfNotPresent
  auth:
    username: 
    password: 
    database: 
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 8Gi
    annotations: {}
  resources: {}
  # When postgresql.enabled is false, set this to your external DB URL
  externalDatabaseUrl: ""
