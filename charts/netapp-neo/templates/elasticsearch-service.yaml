{{- if .Values.elasticsearch.deploy }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netapp-neo.fullname" . }}-elasticsearch
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: elasticsearch
spec:
  type: {{ .Values.elasticsearch.service.type }}
  ports:
    - port: {{ .Values.elasticsearch.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "elasticsearch") | nindent 4 }}
{{- end }}
