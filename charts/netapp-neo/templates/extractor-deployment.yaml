apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netapp-neo.fullname" . }}-extractor
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: extractor
spec:
  replicas: {{ .Values.extractor.replicaCount }}
  selector:
    matchLabels:
      {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "extractor") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "extractor") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.extractor.enabled }}
      serviceAccountName: {{ include "netapp-neo.extractorPrivilegedServiceAccountName" . }}
      {{- end }}
      {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.extractor.enabled }}
      securityContext:
        {{- toYaml .Values.openshift.privilegedWorkloads.extractor.podSecurityContext | nindent 8 }}
      {{- else if and .Values.openshift.deploy .Values.openshift.restrictedV2.enabled }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- else }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        {{- include "netapp-neo.waitForDb" . | nindent 8 }}
      {{- end }}
      containers:
        - name: extractor
          image: "{{ .Values.extractor.image.repository }}:{{ .Values.extractor.image.tag | default (printf "%s-full" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.extractor.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.extractor.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "netapp-neo.fullname" . }}-extractor
                optional: true
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-db
                  key: DATABASE_URL
            {{- include "netapp-neo.dataPlaneEnv" . | nindent 12 }}
          {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.extractor.enabled }}
          securityContext:
            {{- toYaml .Values.openshift.privilegedWorkloads.extractor.containerSecurityContext | nindent 12 }}
          {{- else if and .Values.openshift.deploy .Values.openshift.restrictedV2.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          {{- else }}
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            privileged: true
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            appArmorProfile:
              type: Unconfined
          {{- end }}
          {{- with .Values.extractor.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
