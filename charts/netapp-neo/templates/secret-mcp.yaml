apiVersion: v1
kind: Secret
metadata:
  name: {{ include "netapp-neo.fullname" . }}-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
type: Opaque
stringData:
  MCP_OAUTH_ENABLED: {{ .Values.api.env.MCP_OAUTH_ENABLED | quote }}
  MCP_OAUTH_TENANT_ID: {{ .Values.api.env.MCP_OAUTH_TENANT_ID | quote }}
  MCP_OAUTH_CLIENT_ID: {{ .Values.api.env.MCP_OAUTH_CLIENT_ID | quote }}
  MCP_OAUTH_CLIENT_SECRET: {{ .Values.api.env.MCP_OAUTH_CLIENT_SECRET | quote }}
  MCP_OAUTH_AUDIENCE: {{ .Values.api.env.MCP_OAUTH_AUDIENCE | quote }}
  MCP_API_KEY: {{ .Values.api.env.MCP_API_KEY | quote }}
