apiVersion: v1
kind: Service
metadata:
  name: {{ include "netapp-neo.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  type: {{ .Values.worker.service.type }}
  ports:
    - port: {{ .Values.worker.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "worker") | nindent 4 }}
