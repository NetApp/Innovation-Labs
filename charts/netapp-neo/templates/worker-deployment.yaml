apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netapp-neo.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
  annotations:
    container.apparmor.security.beta.kubernetes.io/worker: unconfined
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "worker") | nindent 8 }}
      annotations:
        container.apparmor.security.beta.kubernetes.io/worker: unconfined
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- if .Values.postgresql.enabled }}
      initContainers:
        {{- include "netapp-neo.waitForDb" . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ include "netapp-neo.imageTag" (dict "imageTag" .Values.worker.image.tag "appVersion" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "netapp-neo.fullname" . }}-worker
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-db
                  key: DATABASE_URL
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-encryption
                  key: ENCRYPTION_KEY
            - name: NETAPP_CONNECTOR_LICENSE
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-license
                  key: NETAPP_CONNECTOR_LICENSE
            - name: CONNECTOR_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-license
                  key: CONNECTOR_ID
            - name: MS_GRAPH_TENANT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-graph
                  key: MS_GRAPH_TENANT_ID
            - name: MS_GRAPH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-graph
                  key: MS_GRAPH_CLIENT_ID
            - name: MS_GRAPH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-graph
                  key: MS_GRAPH_CLIENT_SECRET
            - name: MS_GRAPH_CONNECTOR_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-graph
                  key: MS_GRAPH_CONNECTOR_ID
          securityContext:
            capabilities:
              add:
                - SYS_ADMIN
                - DAC_READ_SEARCH
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
