apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netapp-neo.fullname" . }}-worker
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: worker
spec:
  replicas: {{ .Values.worker.replicaCount }}
  selector:
    matchLabels:
      {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "worker") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "worker") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.worker.enabled }}
      serviceAccountName: {{ include "netapp-neo.workerPrivilegedServiceAccountName" . }}
      {{- end }}
      {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.worker.enabled }}
      securityContext:
        {{- toYaml .Values.openshift.privilegedWorkloads.worker.podSecurityContext | nindent 8 }}
      {{- else if and .Values.openshift.deploy .Values.openshift.restrictedV2.enabled }}
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      {{- else }}
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      {{- end }}
      {{- if .Values.postgresql.enabled }}
      initContainers:
        {{- include "netapp-neo.waitForDb" . | nindent 8 }}
      {{- end }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ include "netapp-neo.imageTag" (dict "imageTag" .Values.worker.image.tag "appVersion" .Chart.AppVersion) }}"
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.worker.service.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "netapp-neo.fullname" . }}-worker
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "netapp-neo.fullname" . }}-db
                  key: DATABASE_URL
            {{- include "netapp-neo.dataPlaneEnv" . | nindent 12 }}
          {{- if and .Values.openshift.deploy .Values.openshift.privilegedWorkloads.worker.enabled }}
          securityContext:
            {{- toYaml .Values.openshift.privilegedWorkloads.worker.containerSecurityContext | nindent 12 }}
          {{- else if and .Values.openshift.deploy .Values.openshift.restrictedV2.enabled }}
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          {{- else }}
          securityContext:
            allowPrivilegeEscalation: true
            runAsNonRoot: false
            appArmorProfile:
              type: Unconfined
            capabilities:
              add:
                - SYS_ADMIN
                - DAC_READ_SEARCH
          {{- end }}
          {{- with .Values.worker.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 20
            failureThreshold: 8
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
      restartPolicy: Always
