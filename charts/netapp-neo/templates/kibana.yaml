{{- if and .Values.elasticsearch.deploy .Values.elasticsearch.kibana.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "netapp-neo.fullname" . }}-kibana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "kibana") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "kibana") | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: kibana
          image: "{{ .Values.elasticsearch.kibana.image.repository }}:{{ .Values.elasticsearch.kibana.image.tag }}"
          imagePullPolicy: {{ .Values.elasticsearch.kibana.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5601
              protocol: TCP
          env:
            - name: ELASTICSEARCH_HOSTS
              value: "http://{{ include "netapp-neo.fullname" . }}-elasticsearch:{{ .Values.elasticsearch.service.port }}"
            - name: XPACK_SECURITY_ENABLED
              value: {{ .Values.elasticsearch.security.enabled | quote }}
          {{- with .Values.elasticsearch.kibana.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          readinessProbe:
            httpGet:
              path: /api/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "netapp-neo.fullname" . }}-kibana
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "netapp-neo.labels" . | nindent 4 }}
    app.kubernetes.io/component: kibana
spec:
  type: {{ .Values.elasticsearch.kibana.service.type }}
  ports:
    - port: {{ .Values.elasticsearch.kibana.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "netapp-neo.selectorLabels" (dict "context" . "component" "kibana") | nindent 4 }}
{{- end }}
